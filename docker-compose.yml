version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: halifaxenergy_sqlserver
    platform: linux/amd64  # Required for Apple Silicon (Rosetta)
    hostname: halifaxenergy-sql
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Developer
      - MSSQL_TCP_PORT=1433
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./sql:/sql  # Mount SQL scripts for easy access
      - ./backups:/backups  # For database backups
    networks:
      - halifaxenergy_network
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -Q "SELECT 1" -b -o /dev/null
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  sqlserver_data:
    driver: local
    name: halifaxenergy_sqlserver_data

networks:
  halifaxenergy_network:
    driver: bridge
    name: halifaxenergy_network
