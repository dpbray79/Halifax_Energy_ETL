name: Deploy to Vercel & Run R Model

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual triggering
  schedule:
    # Run daily at 4:00 AM UTC for model retraining
    - cron: '0 4 * * *'
    # Run daily at 6:00 AM UTC for data extraction
    - cron: '0 6 * * *'

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ── Deploy Dashboard to Vercel ──────────────────────────────────────────────
  deploy-dashboard:
    name: Deploy React Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Dashboard Dependencies
        run: npm ci
        working-directory: ./dashboard

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Dashboard (Vite)
        run: npm run build
        working-directory: ./dashboard
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes

  # ── Run R XGBoost Model ─────────────────────────────────────────────────────
  run-model:
    name: Train XGBoost Models (H1, H2, H3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          pip install SQLAlchemy psycopg2-binary pandas python-dotenv xgboost scikit-learn

      - name: Transform Staging to Gold
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/transform_gold.py

      - name: Run XGBoost Model Training (Python)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/model_train.py
